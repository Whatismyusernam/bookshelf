<style>
  :root{
    --paper:#FFFFFF; --paper-2:#F3F6FB; --ink:#16243F; --ink-soft:#44516B;
    --muted:#8B93A7; --line:#E2E7F0; --line-soft:#EEF1F7;
    --seal:#1E4D8C; --seal-soft:#C5D6EC;
    --surface:#FFFFFF; --on-accent:#FFFFFF; --header-bg:rgba(255,255,255,.85); --btn-primary-hover:#0F1A30;
    --c-invest:#2E5E4E; --c-mgmt:#3B5070; --c-lit:#7A3B5E; --c-self:#8A6A2E; --c-etc:#5A5550;
    --shadow:0 1px 2px rgba(20,30,55,.05), 0 8px 24px rgba(20,30,55,.08);
    --serif:'Noto Serif KR', 'Apple SD Gothic Neo', serif;
    --sans:'Noto Sans KR', 'Apple SD Gothic Neo', system-ui, sans-serif;
  }
  body.dark{
    --paper:#0F141D; --paper-2:#202A3A; --ink:#E6EBF3; --ink-soft:#A7B2C4;
    --muted:#7B8597; --line:#2B3445; --line-soft:#222A38;
    --seal:#6BA6E6; --seal-soft:#33486A;
    --surface:#182030; --on-accent:#0E1420; --header-bg:rgba(15,20,29,.82); --btn-primary-hover:#FFFFFF;
    --shadow:0 1px 2px rgba(0,0,0,.4), 0 10px 26px rgba(0,0,0,.5);
  }
  body.dark .status.done{background:#1C2E26;color:#7FCBA8}
  body.dark .status.reading{background:#1A2740;color:#7FB0EA}
  body.dark .dr.up.on{background:#1C2E26;border-color:#2E5E4E;color:#7FCBA8}
  body.dark .dr.down.on{background:var(--paper-2);border-color:var(--line);color:var(--muted)}
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{font-family:var(--sans); background:var(--paper); color:var(--ink); -webkit-font-smoothing:antialiased; line-height:1.55}
  button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
  input,textarea,select{font-family:inherit;font-size:14px;color:var(--ink)}
  ::selection{background:var(--seal-soft)}
  img{display:block}

  /* ---- Top bar ---- */
  header{position:sticky;top:0;z-index:40;background:var(--header-bg);backdrop-filter:blur(8px);border-bottom:1px solid var(--line)}
  .bar{max-width:1180px;margin:0 auto;padding:14px 24px;display:flex;align-items:center;gap:18px;flex-wrap:wrap}
  .brand{display:flex;align-items:baseline;gap:10px;flex-shrink:0}
  .brand .seal{width:30px;height:30px;border-radius:7px;border:1.5px solid var(--seal);color:var(--seal);font-family:var(--serif);font-weight:700;font-size:16px;display:flex;align-items:center;justify-content:center;transform:rotate(-4deg);align-self:center}
  .brand h1{font-family:var(--serif);font-size:21px;font-weight:600;letter-spacing:-.01em}
  .brand small{color:var(--muted);font-size:12px;margin-left:2px}
  .search{flex:1;min-width:200px;position:relative}
  .search input{width:100%;padding:9px 14px 9px 38px;border:1px solid var(--line);border-radius:10px;background:var(--surface);outline:none;transition:border-color .15s,box-shadow .15s}
  .search input:focus{border-color:var(--ink-soft);box-shadow:0 0 0 3px rgba(30,77,140,.16)}
  .search svg{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--muted)}
  .actions{display:flex;gap:8px;flex-shrink:0}
  .btn{padding:9px 15px;border-radius:10px;font-size:13.5px;font-weight:500;border:1px solid var(--line);background:var(--surface);transition:.15s;white-space:nowrap}
  .btn:hover{border-color:var(--ink-soft);background:var(--paper-2)}
  .btn.primary{background:var(--ink);color:var(--paper);border-color:var(--ink)}
  .btn.primary:hover{background:var(--btn-primary-hover)}
  .btn.ghost{border-color:transparent;color:var(--muted)}
  .btn.ghost:hover{color:var(--ink);background:var(--paper-2)}
  .btn:disabled{opacity:.5;cursor:default}
  .theme-toggle{padding:9px 11px;font-size:15px;line-height:1}

  /* ---- Sub bar ---- */
  .subbar{max-width:1180px;margin:0 auto;padding:12px 24px 0;display:flex;align-items:center;gap:10px;flex-wrap:wrap}
  .chips{display:flex;gap:7px;flex-wrap:wrap}
  .chip{padding:6px 13px;border-radius:999px;font-size:12.5px;font-weight:500;border:1px solid var(--line);background:var(--surface);color:var(--ink-soft);transition:.15s}
  .chip:hover{border-color:var(--ink-soft)}
  .chip.on{background:var(--ink);color:var(--paper);border-color:var(--ink)}
  .chip .dot{display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:6px;vertical-align:middle}
  .tagchip{padding:6px 11px;border-radius:999px;font-size:12px;font-weight:500;border:1px solid var(--seal-soft);background:var(--surface);color:var(--seal);display:inline-flex;align-items:center;gap:6px}
  .tagchip b{font-weight:600}
  .tagchip .rm{font-size:14px;line-height:1;opacity:.7}
  .tagchip:hover .rm{opacity:1}
  .spacer{flex:1}
  .tool{padding:7px 12px;border:1px solid var(--line);border-radius:9px;background:var(--surface);font-size:12.5px;color:var(--ink-soft);display:inline-flex;align-items:center;gap:6px;transition:.15s}
  .tool:hover{border-color:var(--ink-soft)}
  .tool.on{background:var(--ink);color:var(--paper);border-color:var(--ink)}
  .viewtog{display:flex;border:1px solid var(--line);border-radius:9px;overflow:hidden;background:var(--surface)}
  .viewtog button{padding:7px 12px;font-size:12.5px;color:var(--muted);transition:.15s}
  .viewtog button.on{background:var(--ink);color:var(--paper)}
  .sortsel{padding:7px 11px;border:1px solid var(--line);border-radius:9px;background:var(--surface);font-size:12.5px;color:var(--ink-soft)}

  /* ---- Tag cloud panel ---- */
  .tagcloud{max-width:1180px;margin:12px auto 0;padding:0 24px;overflow:hidden;max-height:0;transition:max-height .25s ease}
  .tagcloud.open{max-height:340px}
  .tagcloud-inner{background:var(--surface);border:1px solid var(--line);border-radius:14px;padding:16px 18px;display:flex;flex-wrap:wrap;gap:9px;align-items:center}
  .tagcloud .tc-empty{color:var(--muted);font-size:13px}
  .tc{border:1px solid var(--line);background:var(--paper);border-radius:999px;padding:6px 13px;color:var(--ink-soft);transition:.15s;line-height:1.2}
  .tc:hover{border-color:var(--seal);color:var(--seal)}
  .tc.on{background:var(--seal);color:var(--on-accent);border-color:var(--seal)}
  .tc .cnt{opacity:.55;font-size:.82em;margin-left:5px}
  .tc.on .cnt{opacity:.8}

  /* ---- Stats strip ---- */
  .stats{max-width:1180px;margin:14px auto 0;padding:0 24px;display:flex;gap:26px;flex-wrap:wrap;color:var(--muted);font-size:12.5px}
  .stats b{font-family:var(--serif);color:var(--ink);font-size:18px;font-weight:600;margin-right:5px}

  /* ---- Main / grids ---- */
  main{max-width:1180px;margin:0 auto;padding:22px 24px 80px}

  /* shelf view */
  .grid.shelf{display:grid;grid-template-columns:repeat(auto-fill,minmax(146px,1fr));gap:26px 20px}
  .shelf .item{cursor:pointer}
  .cover{position:relative;width:100%;aspect-ratio:2/3;border-radius:5px;overflow:hidden;background:var(--cc,var(--c-etc));box-shadow:0 2px 4px rgba(20,30,55,.12),0 10px 22px rgba(20,30,55,.15);transition:transform .15s,box-shadow .15s}
  .shelf .item:hover .cover{transform:translateY(-5px);box-shadow:0 4px 8px rgba(20,30,55,.16),0 16px 30px rgba(20,30,55,.22)}
  .cover img{width:100%;height:100%;object-fit:cover}
  .cover::after{content:"";position:absolute;left:0;top:0;bottom:0;width:7px;background:linear-gradient(90deg,rgba(0,0,0,.22),rgba(0,0,0,0));pointer-events:none}
  .cover.ph img{display:none}
  .ph-body{display:none}
  .cover.ph .ph-body{display:flex;flex-direction:column;justify-content:space-between;height:100%;padding:16px 14px;color:rgba(255,255,255,.95)}
  .ph-body .pt{font-family:var(--serif);font-weight:600;font-size:15px;line-height:1.3;display:-webkit-box;-webkit-line-clamp:4;-webkit-box-orient:vertical;overflow:hidden}
  .ph-body .pa{font-size:11px;opacity:.8}
  .shelf .meta{margin-top:9px}
  .shelf .meta .t{font-family:var(--serif);font-size:13.5px;font-weight:600;line-height:1.35;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
  .shelf .meta .a{font-size:11.5px;color:var(--muted);margin-top:2px;display:flex;align-items:center;justify-content:space-between;gap:6px}
  .shelf .seal-rate i{width:10px;height:10px}

  /* card view */
  .grid.cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(230px,1fr));gap:18px}
  .card{background:var(--surface);border:1px solid var(--line);border-radius:14px;overflow:hidden;cursor:pointer;transition:transform .14s,box-shadow .14s,border-color .14s;display:flex;flex-direction:column}
  .card:hover{transform:translateY(-3px);box-shadow:var(--shadow);border-color:var(--line-soft)}
  .card .top{display:flex;gap:0}
  .card .spine{height:7px;width:100%}
  .card-body{padding:16px 16px 14px;display:flex;flex-direction:column;flex:1}
  .card .cat{font-size:11px;font-weight:600;letter-spacing:.02em;margin-bottom:6px}
  .card h3{font-family:var(--serif);font-size:16.5px;font-weight:600;line-height:1.35;letter-spacing:-.01em;margin-bottom:3px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
  .card .author{font-size:12.5px;color:var(--muted);margin-bottom:10px}
  .card .oneliner{font-size:12.5px;color:var(--ink-soft);line-height:1.5;flex:1;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden}
  .card-foot{display:flex;align-items:center;justify-content:space-between;margin-top:12px;padding-top:11px;border-top:1px solid var(--line-soft)}
  .status{font-size:11px;font-weight:600;padding:3px 9px;border-radius:999px}
  .status.done{background:#E8F0EC;color:var(--c-invest)}
  .status.reading{background:#E8EEF8;color:#1E4D8C}
  .status.todo{background:var(--paper-2);color:var(--muted)}
  .seal-rate{display:flex;gap:3px}
  .seal-rate i{width:13px;height:13px;border-radius:3px;border:1px solid var(--seal-soft);display:block}
  .seal-rate i.f{background:var(--seal);border-color:var(--seal)}

  /* ---- Empty ---- */
  .empty{text-align:center;padding:90px 20px;color:var(--muted)}
  .empty .em-seal{width:64px;height:64px;border:2px solid var(--seal);border-radius:14px;color:var(--seal);font-family:var(--serif);font-weight:700;font-size:34px;display:flex;align-items:center;justify-content:center;margin:0 auto 22px;transform:rotate(-5deg)}
  .empty h2{font-family:var(--serif);color:var(--ink);font-size:20px;font-weight:600;margin-bottom:8px}
  .empty p{font-size:14px;margin-bottom:22px}

  /* ---- Modal ---- */
  .overlay{position:fixed;inset:0;background:rgba(16,24,42,.5);z-index:60;display:none;align-items:flex-start;justify-content:center;padding:40px 16px;overflow-y:auto}
  .overlay.show{display:flex}
  .modal{background:var(--paper);border-radius:18px;width:100%;max-width:680px;box-shadow:0 24px 70px rgba(16,24,42,.32);animation:rise .22s ease}
  @keyframes rise{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none}}
  .modal-head{display:flex;align-items:center;justify-content:space-between;padding:20px 24px;border-bottom:1px solid var(--line)}
  .modal-head h2{font-family:var(--serif);font-size:19px;font-weight:600}
  .x{width:32px;height:32px;border-radius:9px;color:var(--muted);font-size:20px;display:flex;align-items:center;justify-content:center;transition:.15s}
  .x:hover{background:var(--paper-2);color:var(--ink)}
  .modal-body{padding:22px 24px}
  .modal-foot{padding:16px 24px;border-top:1px solid var(--line);display:flex;gap:10px;justify-content:flex-end;flex-wrap:wrap}

  .field{margin-bottom:16px}
  .field label{display:block;font-size:12px;font-weight:600;color:var(--muted);margin-bottom:6px;letter-spacing:.01em}
  .field input,.field textarea,.field select{width:100%;padding:10px 12px;border:1px solid var(--line);border-radius:10px;background:var(--surface);outline:none;transition:.15s;line-height:1.5}
  .field input:focus,.field textarea:focus,.field select:focus{border-color:var(--ink-soft);box-shadow:0 0 0 3px rgba(30,77,140,.16)}
  .field textarea{resize:vertical;min-height:64px}
  .row{display:flex;gap:14px}
  .row .field{flex:1}
  .rate-edit{display:flex;gap:6px}
  .rate-edit i{width:26px;height:26px;border-radius:6px;border:1.5px solid var(--seal-soft);cursor:pointer;transition:.12s}
  .rate-edit i:hover{transform:scale(1.08)}
  .rate-edit i.f{background:var(--seal);border-color:var(--seal)}

  /* lookup box */
  .qbox{background:var(--paper-2);border:1px solid var(--line);border-radius:12px;padding:16px;margin-bottom:14px}
  .qbox .qh{display:flex;align-items:center;gap:8px;font-size:13px;font-weight:600;margin-bottom:10px}
  .qbox .qh .b{font-size:10px;font-weight:700;color:var(--c-mgmt);border:1px solid #cdd6e4;border-radius:5px;padding:2px 6px;letter-spacing:.04em}
  .qrow{display:flex;gap:8px}
  .qrow input{flex:1;min-width:0;padding:10px 12px;border:1px solid var(--line);border-radius:10px;background:var(--surface);outline:none}
  .qnote{font-size:11.5px;color:var(--muted);margin-top:8px}
  .qnote.err{color:var(--seal)}
  .lk-results{margin-top:12px;display:flex;flex-direction:column;gap:7px;max-height:260px;overflow-y:auto}
  .lk-item{display:flex;gap:11px;align-items:center;text-align:left;padding:8px;border:1px solid var(--line);border-radius:10px;background:var(--surface);transition:.13s;width:100%}
  .lk-item:hover{border-color:var(--c-mgmt);background:var(--surface)}
  .lk-cover{width:38px;height:54px;border-radius:4px;flex-shrink:0;background:var(--c-etc);overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.15)}
  .lk-cover img{width:100%;height:100%;object-fit:cover}
  .lk-info{min-width:0}
  .lk-t{font-family:var(--serif);font-size:14px;font-weight:600;line-height:1.3;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .lk-m{font-size:11.5px;color:var(--muted);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

  /* AI box */
  .ai-box{background:var(--paper-2);border:1px dashed var(--line);border-radius:12px;padding:16px;margin-bottom:18px}
  .ai-box .ai-h{display:flex;align-items:center;gap:8px;font-size:13px;font-weight:600;margin-bottom:9px}
  .ai-box .ai-h .b{font-size:10px;font-weight:700;color:var(--seal);border:1px solid var(--seal-soft);border-radius:5px;padding:2px 6px;letter-spacing:.04em}
  .ai-box textarea{width:100%;min-height:80px;padding:10px 12px;border:1px solid var(--line);border-radius:10px;background:var(--surface);outline:none;resize:vertical}
  .ai-box .ai-row{display:flex;gap:10px;align-items:center;margin-top:10px}
  .ai-note{font-size:11.5px;color:var(--muted);flex:1}
  .ai-note.err{color:var(--seal)}

  /* cover edit */
  .cover-edit{display:flex;gap:12px;align-items:flex-start}
  .cv-thumb{width:54px;height:78px;border-radius:5px;flex-shrink:0;background:var(--paper-2);border:1px dashed var(--line);overflow:hidden;display:flex;align-items:center;justify-content:center;color:var(--muted);font-size:10px;text-align:center}
  .cv-thumb img{width:100%;height:100%;object-fit:cover}
  .cover-edit input{flex:1;min-width:0}

  /* ---- Detail ---- */
  .detail .d-spine{height:8px;border-radius:18px 18px 0 0}
  .d-head{padding:24px 30px 18px;display:flex;gap:20px}
  .d-cover{width:96px;flex-shrink:0;aspect-ratio:2/3;border-radius:6px;overflow:hidden;background:var(--cc,var(--c-etc));box-shadow:var(--shadow);position:relative}
  .d-cover img{width:100%;height:100%;object-fit:cover}
  .d-cover.ph img{display:none}
  .d-cover .ph-mini{display:none}
  .d-cover.ph .ph-mini{display:flex;align-items:center;justify-content:center;height:100%;padding:10px;color:rgba(255,255,255,.95);font-family:var(--serif);font-weight:600;font-size:13px;text-align:center;line-height:1.3}
  .d-htext{min-width:0;flex:1}
  .d-cat{font-size:12px;font-weight:600;margin-bottom:9px}
  .d-head h2{font-family:var(--serif);font-size:25px;font-weight:700;line-height:1.3;letter-spacing:-.015em;margin-bottom:6px}
  .d-meta{display:flex;align-items:center;gap:13px;flex-wrap:wrap;color:var(--muted);font-size:13px}
  .d-meta .seal-rate i{width:15px;height:15px}
  .d-pub{font-size:12.5px;color:var(--muted);margin-top:7px}
  .d-body{padding:4px 30px 26px}
  .d-sec{margin-bottom:22px}
  .d-sec h4{font-size:12px;font-weight:700;letter-spacing:.06em;color:var(--seal);text-transform:uppercase;margin-bottom:10px;display:flex;align-items:center;gap:9px}
  .d-sec h4::after{content:"";flex:1;height:1px;background:var(--line)}
  .d-sec p{font-size:14.5px;line-height:1.72;color:var(--ink-soft);white-space:pre-wrap}
  .d-sec ul{list-style:none;display:flex;flex-direction:column;gap:9px}
  .d-sec li{font-size:14.5px;line-height:1.6;color:var(--ink-soft);padding-left:20px;position:relative}
  .d-sec li::before{content:"—";position:absolute;left:0;color:var(--seal)}
  .quote{font-family:var(--serif);font-size:16px;font-style:italic;line-height:1.7;color:var(--ink);border-left:3px solid var(--seal);padding:4px 0 4px 18px;margin-bottom:12px;white-space:pre-wrap}
  .tags{display:flex;gap:7px;flex-wrap:wrap;margin-top:4px}
  .tags span{font-size:12px;color:var(--seal);background:var(--surface);border:1px solid var(--seal-soft);border-radius:999px;padding:4px 11px;cursor:pointer;transition:.13s}
  .tags span:hover{background:var(--seal);color:var(--on-accent)}

  /* photo attach (editor) */
  .btn.small{padding:7px 12px;font-size:12.5px}
  .photo-attach{display:flex;align-items:center;gap:10px;margin-top:9px;flex-wrap:wrap}
  .photo-hint{font-size:11.5px;color:var(--muted)}
  .photo-grid{display:flex;flex-direction:column;gap:10px;margin-top:11px}
  .shot{display:flex;gap:11px;align-items:flex-start;background:var(--surface);border:1px solid var(--line);border-radius:11px;padding:9px}
  .shot-thumb{width:62px;height:84px;border-radius:7px;overflow:hidden;flex-shrink:0;border:1px solid var(--line);background:var(--paper-2)}
  .shot-thumb img{width:100%;height:100%;object-fit:cover;cursor:zoom-in}
  .shot-main{flex:1;min-width:0;display:flex;flex-direction:column;gap:6px}
  .shot-text{width:100%;min-height:58px;padding:8px 10px;border:1px solid var(--line);border-radius:8px;background:var(--paper);outline:none;resize:vertical;font-size:13px;line-height:1.5}
  .shot-text:focus{border-color:var(--ink-soft);box-shadow:0 0 0 3px rgba(30,77,140,.16)}
  .shot-meta{display:flex;align-items:center;gap:10px;min-height:18px}
  .ocr-status{font-size:11.5px;color:var(--seal);display:inline-flex;align-items:center;gap:6px}
  .ocr-status::before{content:"";width:11px;height:11px;border:2px solid var(--seal-soft);border-top-color:var(--seal);border-radius:50%;animation:spin .7s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}
  .ocr-read{font-size:11.5px;font-weight:600;color:var(--seal);border:1px solid var(--seal-soft);border-radius:7px;padding:3px 9px;transition:.13s}
  .ocr-read:hover{background:var(--seal);color:var(--on-accent)}
  .shot-del{width:24px;height:24px;border-radius:7px;color:var(--muted);font-size:16px;line-height:1;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:.13s}
  .shot-del:hover{background:var(--paper-2);color:var(--seal)}
  /* detail: photographed quote */
  .shot-view{margin-top:12px}
  .shot-view img{width:170px;max-width:100%;border-radius:10px;border:1px solid var(--line);cursor:zoom-in;transition:.15s;display:block}
  .shot-view img:hover{border-color:var(--seal)}
  .shot-cap{font-family:var(--serif);font-size:14.5px;font-style:italic;line-height:1.6;color:var(--ink);border-left:3px solid var(--seal-soft);padding:3px 0 3px 14px;margin-top:9px;white-space:pre-wrap}
  .pthumb{position:relative;width:74px;height:74px;border-radius:9px;overflow:hidden;border:1px solid var(--line)}
  .pthumb img{width:100%;height:100%;object-fit:cover;cursor:zoom-in}
  .pthumb .del{position:absolute;top:3px;right:3px;width:21px;height:21px;border-radius:50%;background:rgba(16,24,42,.72);color:var(--on-accent);font-size:14px;line-height:1;display:flex;align-items:center;justify-content:center;transition:.13s}
  .pthumb .del:hover{background:var(--seal)}
  /* quote photos (detail) */
  .quote-photos{display:flex;flex-wrap:wrap;gap:10px;margin-top:8px}
  .quote-photos img{width:124px;height:124px;object-fit:cover;border-radius:10px;border:1px solid var(--line);cursor:zoom-in;transition:border-color .15s,transform .15s}
  .quote-photos img:hover{border-color:var(--seal);transform:translateY(-2px)}
  /* lightbox */
  .lightbox{position:fixed;inset:0;background:rgba(16,24,42,.9);z-index:80;display:none;align-items:center;justify-content:center;padding:24px;cursor:zoom-out}
  .lightbox.show{display:flex}
  .lightbox img{max-width:92vw;max-height:92vh;border-radius:8px;box-shadow:0 20px 60px rgba(0,0,0,.55)}
  /* daily quote card */
  .daily{position:relative;background:var(--surface);border:1px solid var(--line);border-radius:16px;padding:clamp(22px,4vw,30px) clamp(20px,4vw,32px) clamp(20px,3.5vw,26px);margin-bottom:22px;overflow:hidden}
  .daily::before{content:"\201C";position:absolute;top:-14px;left:16px;font-family:var(--serif);font-size:128px;line-height:1;color:var(--seal-soft);opacity:.55;pointer-events:none}
  .daily-eyebrow{position:relative;z-index:2;display:flex;align-items:center;gap:8px;font-size:11px;font-weight:700;letter-spacing:.09em;text-transform:uppercase;color:var(--seal);margin-bottom:14px}
  .daily-shuffle{margin-left:auto;width:30px;height:30px;border-radius:8px;border:1px solid var(--line);color:var(--muted);font-size:15px;display:flex;align-items:center;justify-content:center;transition:transform .25s,border-color .15s,color .15s}
  .daily-shuffle:hover{border-color:var(--seal);color:var(--seal);transform:rotate(180deg)}
  .daily-text{position:relative;z-index:1;font-family:var(--serif);font-size:clamp(17px,2.2vw,21px);line-height:1.62;color:var(--ink);font-style:italic;cursor:pointer;white-space:pre-wrap}
  .daily-src{position:relative;z-index:1;margin-top:16px;font-size:13px;color:var(--muted);cursor:pointer;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
  .daily-src .dot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
  .daily-src b{font-family:var(--serif);font-weight:600;color:var(--ink-soft)}
  .daily-src:hover b{color:var(--seal)}
  .daily-react{display:flex;gap:8px;margin-top:16px;padding-top:14px;border-top:1px solid var(--line-soft)}
  .dr{display:inline-flex;align-items:center;gap:6px;padding:7px 13px;border:1px solid var(--line);border-radius:9px;font-size:12.5px;font-weight:500;color:var(--ink-soft);background:var(--surface);transition:.14s}
  .dr span{font-weight:600}
  .dr:hover{border-color:var(--ink-soft)}
  .dr.up.on{background:#E7F1EC;border-color:#9ECBB4;color:#2F6A52}
  .dr.down.on{background:var(--paper-2);border-color:var(--line);color:var(--muted)}
  /* now reading band */
  .nowreading{margin-bottom:26px;background:var(--paper-2);border:1px solid var(--line);border-radius:16px;padding:16px 18px}
  .nr-head{font-family:var(--serif);font-size:14.5px;font-weight:600;color:var(--ink);margin-bottom:13px;display:flex;align-items:center;gap:8px}
  .nr-head span{font-family:var(--sans);font-size:11px;font-weight:600;color:var(--on-accent);background:var(--seal);border-radius:999px;padding:1px 8px}
  .nr-row{display:flex;gap:12px;overflow-x:auto;padding-bottom:4px;scrollbar-width:thin}
  .nr-card{flex:0 0 auto;width:236px;background:var(--surface);border:1px solid var(--line);border-radius:12px;padding:12px;display:flex;flex-direction:column;gap:11px}
  .nr-top{display:flex;gap:11px;cursor:pointer}
  .nr-cover{width:44px;height:62px;border-radius:5px;flex-shrink:0;overflow:hidden;background:var(--cc,var(--c-etc));box-shadow:var(--shadow);position:relative}
  .nr-cover img{width:100%;height:100%;object-fit:cover}
  .nr-cover.ph img{display:none}
  .nr-cover .ph-mini2{display:none}
  .nr-cover.ph .ph-mini2{display:flex;align-items:center;justify-content:center;height:100%;padding:5px;color:rgba(255,255,255,.95);font-family:var(--serif);font-size:9px;text-align:center;line-height:1.2;overflow:hidden}
  .nr-info{min-width:0}
  .nr-info .t{font-family:var(--serif);font-size:14px;font-weight:600;line-height:1.3;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
  .nr-info .a{font-size:11.5px;color:var(--muted);margin-top:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .nr-actions{display:flex;gap:7px}
  .nr-actions button{flex:1;padding:8px 6px;border:1px solid var(--line);border-radius:9px;background:var(--surface);font-size:12.5px;font-weight:500;color:var(--ink-soft);transition:.14s;display:flex;align-items:center;justify-content:center;gap:5px}
  .nr-actions button:hover{border-color:var(--seal);color:var(--seal)}
  /* quick sheet + toast */
  .modal.quick{max-width:520px}
  .toast{position:fixed;left:50%;bottom:28px;transform:translateX(-50%) translateY(20px);background:var(--ink);color:var(--on-accent);padding:11px 20px;border-radius:999px;font-size:13px;font-weight:500;box-shadow:0 10px 30px rgba(16,24,42,.35);opacity:0;pointer-events:none;transition:opacity .2s,transform .2s;z-index:90;max-width:88vw;text-align:center}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
  /* primary tabs */
  .tabs{max-width:1180px;margin:0 auto;padding:2px clamp(16px,4vw,24px) 0;display:flex;gap:4px;border-bottom:1px solid var(--line)}
  .tab{position:relative;padding:11px 16px 13px;font-size:14px;font-weight:600;color:var(--muted);transition:color .15s;display:flex;align-items:center;gap:7px}
  .tab:hover{color:var(--ink-soft)}
  .tab.on{color:var(--ink)}
  .tab.on::after{content:"";position:absolute;left:12px;right:12px;bottom:-1px;height:2px;background:var(--seal);border-radius:2px}
  .tab .tc-count{font-size:11px;font-weight:600;color:var(--muted);background:var(--paper-2);border-radius:999px;padding:1px 8px;min-width:20px;text-align:center}
  .tab.on .tc-count{background:var(--seal-soft);color:var(--seal)}
  /* excerpts (commonplace) view */
  #excerptsView{padding-top:2px}
  .excerpts{columns:1;column-gap:16px}
  @media(min-width:640px){.excerpts{columns:2}}
  @media(min-width:1000px){.excerpts{columns:3}}
  .ex-card{break-inside:avoid;-webkit-column-break-inside:avoid;margin:0 0 16px;background:var(--surface);border:1px solid var(--line);border-radius:13px;padding:17px 18px 14px;cursor:pointer;transition:transform .14s,box-shadow .14s,border-color .14s}
  .ex-card:hover{transform:translateY(-2px);box-shadow:var(--shadow);border-color:var(--line-soft)}
  .ex-type{font-size:10.5px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--seal);margin-bottom:9px}
  .ex-text{font-family:var(--serif);font-size:15.5px;line-height:1.62;color:var(--ink);white-space:pre-wrap}
  .ex-img{width:100%;border-radius:9px;border:1px solid var(--line);display:block}
  .ex-src{margin-top:13px;padding-top:11px;border-top:1px solid var(--line-soft);font-size:12px;color:var(--muted);display:flex;align-items:center;gap:7px}
  .ex-src .dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
  .ex-src b{font-family:var(--serif);font-weight:600;color:var(--ink-soft)}
  /* annual review */
  .rv-open{margin-left:auto;font-size:12.5px;font-weight:600;color:var(--seal);border:1px solid var(--seal-soft);border-radius:999px;padding:5px 13px;transition:.14s}
  .rv-open:hover{background:var(--seal);color:var(--on-accent)}
  .modal.review{max-width:560px}
  .review-body{padding:8px 26px 24px}
  .rv-yearsel{display:flex;align-items:center;justify-content:center;gap:16px;margin:4px 0 18px}
  .rv-yearsel button{width:32px;height:32px;border-radius:9px;border:1px solid var(--line);color:var(--ink-soft);font-size:18px;line-height:1}
  .rv-yearsel button:hover:not(:disabled){border-color:var(--seal);color:var(--seal)}
  .rv-yearsel button:disabled{opacity:.3}
  .rv-year{font-family:var(--serif);font-size:23px;font-weight:700}
  .rv-hero{text-align:center;padding:14px 0 4px}
  .rv-hero .big{font-family:var(--serif);font-size:62px;font-weight:700;line-height:1;color:var(--seal)}
  .rv-hero .cap{font-size:13px;color:var(--muted);margin-top:8px}
  .rv-chips{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin:18px 0 4px}
  .rv-chip{background:var(--paper-2);border:1px solid var(--line);border-radius:12px;padding:11px 15px;text-align:center;min-width:92px}
  .rv-chip b{display:block;font-family:var(--serif);font-size:21px;font-weight:700;color:var(--ink)}
  .rv-chip span{font-size:11px;color:var(--muted)}
  .rv-sec{margin-top:26px}
  .rv-sec h3{font-size:11.5px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--seal);margin-bottom:14px;display:flex;align-items:center;gap:9px}
  .rv-sec h3::after{content:"";flex:1;height:1px;background:var(--line)}
  .rv-months{display:flex;align-items:flex-end;gap:5px;height:92px}
  .rv-mo{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;height:100%;justify-content:flex-end}
  .rv-mo .bar{width:100%;background:var(--seal);border-radius:3px 3px 0 0;min-height:2px}
  .rv-mo .ml{font-size:9px;color:var(--muted)}
  .rv-mo .mv{font-size:9.5px;color:var(--ink-soft);font-weight:600;height:12px}
  .rv-cat{display:flex;flex-direction:column;gap:9px}
  .rv-crow{display:flex;align-items:center;gap:10px}
  .rv-cname{font-size:12.5px;width:62px;color:var(--ink-soft);flex-shrink:0}
  .rv-ctrack{flex:1;height:18px;background:var(--paper-2);border-radius:6px;overflow:hidden}
  .rv-cfill{height:100%;border-radius:6px;min-width:3px}
  .rv-cnum{font-size:12px;color:var(--muted);width:34px;text-align:right;flex-shrink:0}
  .rv-books{display:flex;gap:13px;flex-wrap:wrap}
  .rv-bk{width:64px;text-align:center;cursor:pointer}
  .rv-bk .cv{width:64px;height:91px;border-radius:5px;overflow:hidden;background:var(--cc,var(--c-etc));box-shadow:var(--shadow);position:relative;margin-bottom:6px;display:flex;align-items:center;justify-content:center}
  .rv-bk .cv img{width:100%;height:100%;object-fit:cover}
  .rv-bk .cv.ph span{font-family:var(--serif);font-size:8.5px;color:rgba(255,255,255,.95);line-height:1.25;padding:5px;display:-webkit-box;-webkit-line-clamp:4;-webkit-box-orient:vertical;overflow:hidden}
  .rv-bk:hover .cv{transform:translateY(-2px)}
  .rv-bk .bt{font-size:10.5px;color:var(--ink-soft);line-height:1.3;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
  .rv-quotes{display:flex;flex-direction:column;gap:12px}
  .rv-q{border-left:3px solid var(--seal);padding:3px 0 3px 14px;cursor:pointer}
  .rv-q:hover .qt{color:var(--seal)}
  .rv-q .qt{font-family:var(--serif);font-size:14.5px;font-style:italic;line-height:1.55;color:var(--ink);transition:color .14s}
  .rv-q .qs{font-size:11.5px;color:var(--muted);margin-top:5px}
  .rv-empty{text-align:center;color:var(--muted);padding:34px 0;font-size:14px}
  .safety-nudge{background:var(--paper-2);border:1px solid var(--line);border-radius:13px;padding:13px 15px;margin-bottom:18px;display:flex;align-items:flex-start;gap:12px}
  .safety-nudge .sn-ico{font-size:18px;line-height:1.4;flex-shrink:0}
  .safety-nudge .sn-body{flex:1;min-width:0}
  .safety-nudge .sn-title{font-size:13.5px;font-weight:600;color:var(--ink);margin-bottom:3px}
  .safety-nudge .sn-desc{font-size:12.5px;color:var(--ink-soft);line-height:1.55}
  .safety-nudge .sn-actions{display:flex;gap:8px;margin-top:11px;flex-wrap:wrap}
  .safety-nudge .sn-actions button{padding:7px 13px;border-radius:9px;font-size:12.5px;font-weight:600;border:1px solid var(--line);background:var(--surface);color:var(--ink-soft);transition:.14s}
  .safety-nudge .sn-actions .sn-go{background:var(--ink);color:var(--paper);border-color:var(--ink)}
  .safety-nudge .sn-actions button:hover{border-color:var(--ink-soft)}
  .safety-nudge .sn-x{width:24px;height:24px;border-radius:7px;color:var(--muted);font-size:17px;line-height:1;display:flex;align-items:center;justify-content:center;flex-shrink:0}
  .safety-nudge .sn-x:hover{background:var(--surface);color:var(--ink)}
  .hide{display:none !important}
  .file-in{display:none}
  @media (max-width:560px){
    .bar{padding:12px 16px} .subbar,.stats,main,.tagcloud{padding-left:16px;padding-right:16px}
    .row{flex-direction:column;gap:0}
    .d-head{padding-left:20px;padding-right:20px;gap:14px} .d-body{padding-left:20px;padding-right:20px}
    .d-cover{width:74px}
    .grid.shelf{grid-template-columns:repeat(auto-fill,minmax(108px,1fr));gap:20px 14px}
  }
</style>
</head>
<body>

<header>
  <div class="bar">
    <div class="brand">
      <span class="seal">冊</span>
      <h1>책장 <small>나의 독서 기록</small></h1>
    </div>
    <div class="search">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></svg>
      <input id="q" type="text" placeholder="제목 · 저자 · 요약 · 구절 검색…">
    </div>
    <div class="actions">
      <button class="btn ghost theme-toggle" id="themeBtn" title="다크 모드로" aria-label="테마 전환">🌙</button>
      <button class="btn ghost" id="exportBtn">내보내기</button>
      <button class="btn ghost" id="importBtn">불러오기</button>
      <button class="btn primary" id="addBtn">＋ 책 추가</button>
    </div>
  </div>
  <div class="tabs">
    <button class="tab on" data-mode="library">책장</button>
    <button class="tab" data-mode="excerpts">발췌집 <span class="tc-count">0</span></button>
  </div>
  <div class="subbar">
    <div class="chips" id="catChips"></div>
    <div class="chips" id="tagFilters"></div>
    <div class="spacer"></div>
    <button class="tool" id="tagBtn"># 태그</button>
    <span id="libCtrls" style="display:flex;gap:10px">
      <span class="viewtog">
        <button data-view="shelf" class="on">책장</button>
        <button data-view="cards">카드</button>
      </span>
      <select class="sortsel" id="sortSel">
        <option value="recent">최근 등록순</option>
        <option value="title">제목순</option>
        <option value="rating">평점 높은순</option>
        <option value="date">읽은 날짜순</option>
      </select>
    </span>
    <select class="sortsel hide" id="exSort">
      <option value="recent">최근 추가순</option>
      <option value="book">책별</option>
      <option value="random">무작위</option>
    </select>
  </div>
  <div class="tagcloud" id="tagCloud"><div class="tagcloud-inner" id="tagCloudInner"></div></div>
  <div class="stats" id="stats"></div>
</header>

<main>
  <div id="libraryView">
    <div class="safety-nudge hide" id="safetyNudge"></div>
    <section class="daily hide" id="daily"></section>
    <section class="nowreading hide" id="nowReading"></section>
    <div class="grid shelf" id="grid"></div>
    <div class="empty hide" id="empty">
      <div class="em-seal">冊</div>
      <h2 id="emptyTitle">아직 등록된 책이 없습니다</h2>
      <p id="emptyMsg">제목이나 ISBN만 넣으면 표지·저자·출판사를 자동으로 채워드립니다.</p>
      <button class="btn primary" id="emptyAdd">＋ 첫 책 추가하기</button>
    </div>
  </div>
  <div id="excerptsView" class="hide">
    <div class="excerpts" id="excerpts"></div>
    <div class="empty hide" id="exEmpty"><div class="em-seal">“</div><h2></h2><p></p></div>
  </div>
</main>

<input type="file" id="fileIn" class="file-in" accept="application/json">

<!-- Edit / Add modal -->
<div class="overlay" id="editOverlay">
  <div class="modal">
    <div class="modal-head">
      <h2 id="editTitle">책 추가</h2>
      <button class="x" data-close>×</button>
    </div>
    <div class="modal-body">
      <div class="qbox">
        <div class="qh"><span class="b">검색</span> 제목 또는 ISBN으로 정보 가져오기</div>
        <div class="qrow">
          <input id="qInput" type="text" placeholder="예) 데미안  ·  9788954682152">
          <button class="btn" id="qBtn">가져오기</button>
        </div>
        <div class="qnote" id="qNote">표지·저자·출판사·출간연도를 자동으로 채웁니다. 인터넷 연결 필요.</div>
        <div class="lk-results" id="lkResults"></div>
      </div>

      <div class="ai-box">
        <div class="ai-h"><span class="b">AI</span> 독서 노트로 요약 자동 생성</div>
        <textarea id="aiInput" placeholder="읽으면서 메모한 내용을 자유롭게 붙여넣으세요. 핵심 내용 / 인사이트 / 인상 깊은 구절 / 적용점으로 정리해 드립니다."></textarea>
        <div class="ai-row">
          <span class="ai-note" id="aiNote">제목만 적어도 됩니다. 결과는 검토 후 수정하세요.</span>
          <button class="btn" id="aiBtn">요약 생성</button>
        </div>
      </div>

      <div class="row">
        <div class="field"><label>제목</label><input id="fTitle" type="text"></div>
        <div class="field"><label>저자</label><input id="fAuthor" type="text"></div>
      </div>

<script>
const STORE_KEY='bookshelf_data_v1';
const VIEW_KEY='bookshelf_view';
const MODE_KEY='bookshelf_mode';
const THEME_KEY='bookshelf_theme';
const BACKUP_KEY='bookshelf_last_backup';
const SNOOZE_KEY='bookshelf_backup_snooze';
const INSTALL_TIP_KEY='bookshelf_install_tip';
const CATS={'투자':'var(--c-invest)','경영':'var(--c-mgmt)','문학':'var(--c-lit)','자기계발':'var(--c-self)','기타':'var(--c-etc)'};
const CAT_HEX={'투자':'#2E5E4E','경영':'#3B5070','문학':'#7A3B5E','자기계발':'#8A6A2E','기타':'#5A5550'};
const STATUS_LABEL={done:'완독',reading:'읽는 중',todo:'읽을 책'};

let books=[];
let memoryOnly=false;
let lkResults=[];
let state={q:'',cat:'전체',tags:[],sort:'recent',view:'shelf',mode:'library',theme:'light',exSort:'recent',excerptSeed:0,editId:null,rate:0,detailId:null,cloudOpen:false,photos:[],quickId:null,quickPhotos:[],directCaptureId:null,dailyKey:null,dailyDay:0};

/* ---------- storage ---------- */
function load(){
  try{ const raw=localStorage.getItem(STORE_KEY); books=raw?JSON.parse(raw):[]; }
  catch(e){ memoryOnly=true; books=[]; }
  try{ const v=localStorage.getItem(VIEW_KEY); if(v==='cards'||v==='shelf') state.view=v; }catch(e){}
  try{ const mo=localStorage.getItem(MODE_KEY); if(mo==='library'||mo==='excerpts') state.mode=mo; }catch(e){}
  try{ const t=localStorage.getItem(THEME_KEY); if(t==='dark'||t==='light') state.theme=t; else if(window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) state.theme='dark'; }catch(e){}
  loadReactions();
  migrate();
}
function migrate(){
  let changed=false;
  books.forEach(b=>{
    if(!Array.isArray(b.quoteShots)){
      b.quoteShots=(b.quotePhotos||[]).map(img=>({img,text:''}));
      changed=true;
    }
    if('quotePhotos' in b){ delete b.quotePhotos; changed=true; }
  });
  if(changed) save();
}
function save(){ if(memoryOnly) return true; try{ localStorage.setItem(STORE_KEY,JSON.stringify(books)); return true; }catch(e){ console.warn('save failed',e); return false; } }
function saveView(){ try{ localStorage.setItem(VIEW_KEY,state.view); }catch(e){} }
function saveMode(){ try{ localStorage.setItem(MODE_KEY,state.mode); }catch(e){} }
function applyTheme(){
  const dark=state.theme==='dark';
  document.body.classList.toggle('dark',dark);
  const b=document.getElementById('themeBtn');
  if(b){ b.textContent=dark?'☀️':'🌙'; b.title=dark?'라이트 모드로':'다크 모드로'; }
  const mc=document.getElementById('themeColor'); if(mc) mc.setAttribute('content', dark?'#0F141D':'#FFFFFF');
}
function toggleTheme(){ state.theme=state.theme==='dark'?'light':'dark'; try{ localStorage.setItem(THEME_KEY,state.theme); }catch(e){} applyTheme(); }
const REACT_KEY='bookshelf_reactions';
let reactions={};
function loadReactions(){ try{ reactions=JSON.parse(localStorage.getItem(REACT_KEY)||'{}')||{}; }catch(e){ reactions={}; } }
function saveReactions(){ try{ localStorage.setItem(REACT_KEY,JSON.stringify(reactions)); }catch(e){} }
function hashStr(s){ let h=0; s=s||''; for(let i=0;i<s.length;i++){ h=(h*31+s.charCodeAt(i))|0; } return h.toString(36); }
function passKey(p){ return p.id+'|'+hashStr(p.text); }
function reactionOf(p){ return reactions[passKey(p)]||0; }
function setReaction(p,val){ const k=passKey(p); if(val===0) delete reactions[k]; else reactions[k]=val; saveReactions(); }
function uid(){ return Date.now().toString(36)+Math.random().toString(36).slice(2,7); }
function esc(s){ return (s||'').replace(/[&<>"]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m])); }
function catColor(c){ return CATS[c]||'var(--c-etc)'; }
function catHex(c){ return CAT_HEX[c]||'#5A5550'; }

/* ---------- Google Books lookup ---------- */
function cleanCover(url){ if(!url) return ''; return url.replace(/^http:\/\//,'https://').replace(/&edge=curl/,''); }
function mapCat(cats){
  const s=(cats||[]).join(' ').toLowerCase();
  if(/invest|finance|stock|money|trading/.test(s)) return '투자';
  if(/business|econom|management|market|entrepreneur/.test(s)) return '경영';
  if(/fiction|literary|novel|poetry|drama|classic|story|stories/.test(s)) return '문학';
  if(/self-?help|personal|psychology|motivat|productivity/.test(s)) return '자기계발';
  return '';
}
/* 국립중앙도서관 서지정보(Seoji) API 프록시 주소(Cloudflare Worker).
   배포 후 워커 주소를 아래에 넣으세요. 비워두면 구글 북스만 사용합니다. */
const NLK_PROXY=''; // 예: 'https://book-lookup.내계정.workers.dev'

function wait(ms){ return new Promise(r=>setTimeout(r,ms)); }
async function fetchBooksJSON(url){
  const MAX=2; let lastErr;
  for(let attempt=0; attempt<MAX; attempt++){
    const ctrl=new AbortController();
    const timer=setTimeout(()=>ctrl.abort(),9000);
    let res;
    try{
      res=await fetch(url,{signal:ctrl.signal});
    }catch(e){
      clearTimeout(timer);
      lastErr=(e&&e.name==='AbortError')?new Error('timeout'):(e||new Error('network'));
      if(attempt<MAX-1){ await wait(700*(attempt+1)); continue; }
      throw lastErr;
    }
    clearTimeout(timer);
    if(res.ok) return await res.json();
    lastErr=new Error('http '+res.status);
    if((res.status===429||res.status>=500) && attempt<MAX-1){ await wait(700*(attempt+1)); continue; }
    throw lastErr;
  }
  throw lastErr||new Error('unknown');
}
function normalizeGB(data){
  return (data.items||[]).map(it=>{
    const v=it.volumeInfo||{};
    return {
      title:v.title?(v.subtitle?`${v.title}: ${v.subtitle}`:v.title):'',
      author:(v.authors||[]).join(', '),
      publisher:v.publisher||'',
      year:(v.publishedDate||'').slice(0,4),
      cover:cleanCover((v.imageLinks||{}).thumbnail||(v.imageLinks||{}).smallThumbnail||''),
      cat:mapCat(v.categories)
    };
  }).filter(x=>x.title);
}
async function searchNLK(raw){
  const base=NLK_PROXY.replace(/\/+$/,'');
  const data=await fetchBooksJSON(`${base}/?q=${encodeURIComponent(raw)}`);
  const arr=Array.isArray(data)?data:(data.items||data.docs||[]);
  return arr.map(b=>({
    title:(b.title||'').trim(),
    author:(b.author||'').trim(),
    publisher:(b.publisher||'').trim(),
    year:(b.year||'').toString().slice(0,4),
    cover:cleanCover(b.cover||''),
    cat:(b.cat && CATS[b.cat])?b.cat:''
  })).filter(x=>x.title);
}
async function lookup(){
  const raw=document.getElementById('qInput').value.trim();
  if(!raw){ setQNote('제목이나 ISBN을 입력하세요.',true); return; }
  const btn=document.getElementById('qBtn'); btn.disabled=true; btn.textContent='검색 중…';
  setQNote('검색하고 있습니다…',false);
  document.getElementById('lkResults').innerHTML='';
  let items=[], nlkErr=null;
  try{
    // 1) 국립중앙도서관(프록시) 우선
    if(NLK_PROXY){
      try{ items=await searchNLK(raw); }
      catch(e){ nlkErr=e; console.warn('NLK lookup failed:',e); }
    }
    // 2) 없거나 실패하면 구글 북스로 폴백
    if(items.length===0){
      const digits=raw.replace(/[^0-9Xx]/g,'');
      const isIsbn=(digits.length===10||digits.length===13);
      const q=isIsbn?('isbn:'+digits):encodeURIComponent(raw);
      // country 파라미터가 없으면 구글 북스가 요청을 거부(403/503)하는 경우가 많음 → KR 명시
      const gb=`https://www.googleapis.com/books/v1/volumes?q=${q}&maxResults=8&country=KR`;
      items=normalizeGB(await fetchBooksJSON(gb));
    }
    lkResults=items;
    if(items.length===0){ setQNote('검색 결과가 없습니다. 제목 철자나 ISBN을 확인하거나 아래에 직접 입력하세요.',true); }
    else { setQNote(`${items.length}건 — 맞는 책을 선택하세요.`,false); renderLkResults(); }
  }catch(e){
    const m=(e&&e.message)||'';
    let msg;
    if(m==='timeout') msg='응답이 너무 느려요. 잠시 후 다시 시도하거나 아래에 직접 입력하세요.';
    else if(/^http 4\d\d$/.test(m)) msg=`도서 검색 요청이 거부됐어요(${m.replace('http ','HTTP ')}). 잠시 후 다시 시도하거나 직접 입력하세요.`;
    else if(/^http 5\d\d$/.test(m)) msg='도서 서버가 일시적으로 불안정해요. 잠시 후 다시 시도해 주세요.';
    else msg='검색에 실패했습니다. 광고·콘텐츠 차단(애드블록)이 켜져 있으면 꺼 보거나, 인터넷 연결을 확인하거나 직접 입력하세요.';
    setQNote(msg,true);
    console.warn('book lookup failed:', e, 'nlkErr:', nlkErr);
  }finally{ btn.disabled=false; btn.textContent='가져오기'; }
}
function setQNote(t,err){ const n=document.getElementById('qNote'); n.textContent=t; n.classList.toggle('err',!!err); }
function renderLkResults(){
  document.getElementById('lkResults').innerHTML=lkResults.map((r,i)=>{
    const cov=r.cover?`<img src="${esc(r.cover)}" alt="">`:'';
    const meta=[r.author,r.publisher,r.year].filter(Boolean).join(' · ');
    return `<button class="lk-item" data-i="${i}"><div class="lk-cover">${cov}</div><div class="lk-info"><div class="lk-t">${esc(r.title)}</div><div class="lk-m">${esc(meta)||'정보 없음'}</div></div></button>`;
  }).join('');
  document.getElementById('lkResults').querySelectorAll('.lk-item').forEach(b=>b.onclick=()=>applyResult(+b.dataset.i));
}
function applyResult(i){
  const r=lkResults[i]; if(!r) return;
  document.getElementById('fTitle').value=r.title||'';
  if(r.author) document.getElementById('fAuthor').value=r.author;
  if(r.publisher) document.getElementById('fPublisher').value=r.publisher;
  if(r.year) document.getElementById('fYear').value=r.year;
  if(r.cat && CATS[r.cat]) document.getElementById('fCat').value=r.cat;
  document.getElementById('fCover').value=r.cover||'';
  updateCvThumb();
  document.getElementById('lkResults').innerHTML='';
  setQNote('적용했습니다. 나머지 항목을 채워 저장하세요.',false);
}

/* ---------- chips / cloud / stats ---------- */
function renderChips(){
  const wrap=document.getElementById('catChips');
  const all=['전체',...Object.keys(CATS)];
  wrap.innerHTML=all.map(c=>{
    const on=state.cat===c?'on':'';
    const dot=c==='전체'?'':`<span class="dot" style="background:${catColor(c)}"></span>`;
    return `<button class="chip ${on}" data-cat="${c}">${dot}${c}</button>`;
  }).join('');
  wrap.querySelectorAll('.chip').forEach(b=>b.onclick=()=>{ state.cat=b.dataset.cat; render(); });
}
function tagCounts(){
  const m={};
  books.forEach(b=>(b.tags||[]).forEach(t=>{ m[t]=(m[t]||0)+1; }));
  return m;
}
function renderTagFilters(){
  const wrap=document.getElementById('tagFilters');
  wrap.innerHTML=state.tags.map(t=>`<button class="tagchip" data-t="${esc(t)}"><b>#${esc(t)}</b><span class="rm">×</span></button>`).join('');
  wrap.querySelectorAll('.tagchip').forEach(b=>b.onclick=()=>{ toggleTag(b.dataset.t); });
}
function renderTagCloud(){
  const counts=tagCounts();
  const tags=Object.keys(counts).sort((a,b)=>counts[b]-counts[a]||a.localeCompare(b,'ko'));
  const inner=document.getElementById('tagCloudInner');
  if(tags.length===0){ inner.innerHTML='<span class="tc-empty">아직 태그가 없습니다. 책에 태그를 달면 여기에 모입니다.</span>'; return; }
  const max=Math.max(...tags.map(t=>counts[t])), min=Math.min(...tags.map(t=>counts[t]));
  inner.innerHTML=tags.map(t=>{
    const sz=max===min?14:13+Math.round((counts[t]-min)/(max-min)*7);
    const on=state.tags.includes(t)?'on':'';
    return `<button class="tc ${on}" data-t="${esc(t)}" style="font-size:${sz}px">#${esc(t)}<span class="cnt">${counts[t]}</span></button>`;
  }).join('');
  inner.querySelectorAll('.tc').forEach(b=>b.onclick=()=>{ toggleTag(b.dataset.t); });
}
function toggleTag(t){
  const i=state.tags.indexOf(t);
  if(i>=0) state.tags.splice(i,1); else state.tags.push(t);
  render();
}
function renderStats(){
  const total=books.length, done=books.filter(b=>b.status==='done').length, reading=books.filter(b=>b.status==='reading').length;
  const years=availableYears(); const yLabel=years.length?years[0]:new Date().getFullYear();
  const btn = total>0 ? `<button class="rv-open" id="reviewBtn">🎉 ${yLabel} 결산</button>` : '';
  document.getElementById('stats').innerHTML=`<span><b>${total}</b>권</span><span><b>${done}</b>완독</span><span><b>${reading}</b>읽는 중</span>${btn}`;
  const rb=document.getElementById('reviewBtn'); if(rb) rb.onclick=()=>openReview();
}

/* ---------- 연간 독서 결산 ---------- */
function bookYear(b){
  if(b.date && /^\d{4}/.test(b.date)) return +b.date.slice(0,4);
  if(b.createdAt) return new Date(b.createdAt).getFullYear();
  return null;
}
function availableYears(){
  const set=new Set();
  books.forEach(b=>{ const y=bookYear(b); if(y) set.add(y); });
  return [...set].sort((a,b)=>b-a);
}
function lovedPassages(arr){
  const loved=[];
  arr.forEach(b=>{
    const base={id:b.id,title:b.title,author:b.author,cat:b.cat};
    const lines=(b.quote||'').split('\n').map(s=>s.trim()).filter(Boolean)
      .concat((b.insight||'').split('\n').map(s=>s.trim()).filter(Boolean))
      .concat((b.quoteShots||[]).map(s=>(s.text||'').trim()).filter(Boolean));
    lines.forEach(t=>{ if(reactions[b.id+'|'+hashStr(t)]===1) loved.push({...base,text:t}); });
  });
  return loved;
}
function reviewData(Y){
  const ofYear=books.filter(b=>bookYear(b)===Y);
  const done=ofYear.filter(b=>b.status==='done');
  const catCounts={}; done.forEach(b=>{ catCounts[b.cat]=(catCounts[b.cat]||0)+1; });
  const months=new Array(12).fill(0);
  done.forEach(b=>{ if(b.date&&/^\d{4}-\d{2}/.test(b.date)){ const m=+b.date.slice(5,7)-1; if(m>=0&&m<12) months[m]++; } });
  const rated=done.filter(b=>b.rate>0);
  const avg=rated.length? rated.reduce((s,b)=>s+b.rate,0)/rated.length : 0;
  const fiveStars=done.filter(b=>b.rate===5);
  let passageCount=0; ofYear.forEach(b=>{ passageCount += (b.quote||'').split('\n').filter(s=>s.trim()).length + (b.insight||'').split('\n').filter(s=>s.trim()).length + (b.quoteShots||[]).filter(s=>(s.text||'').trim()).length; });
  let topCat='',mx=0; Object.entries(catCounts).forEach(([k,v])=>{ if(v>mx){mx=v;topCat=k;} });
  let loved=lovedPassages(ofYear);
  if(loved.length===0){ fiveStars.forEach(b=>{ const q=(b.quote||'').split('\n').map(s=>s.trim()).filter(Boolean)[0]; if(q) loved.push({id:b.id,title:b.title,author:b.author,cat:b.cat,text:q}); }); }
  return {Y, totalCount:ofYear.length, doneCount:done.length, catCounts, months, avg, fiveStars, passageCount, topCat, loved};
}
function openReview(){
  const years=availableYears();
  state.reviewYear = years.length ? years[0] : new Date().getFullYear();
  renderReview(); open('reviewOverlay');
}
function renderReview(){
  const body=document.getElementById('reviewBody');
  const years=availableYears();
  if(years.length===0){ body.innerHTML=`<div class="rv-empty">아직 기록이 없어요. 책을 추가하면 결산을 볼 수 있어요.</div>`; return; }
  const Y=state.reviewYear, d=reviewData(Y), yi=years.indexOf(Y);
  let h=`<div class="rv-yearsel"><button id="rvPrev" ${yi>=years.length-1?'disabled':''}>‹</button><span class="rv-year">${Y}</span><button id="rvNext" ${yi<=0?'disabled':''}>›</button></div>`;
  if(d.totalCount===0){ h+=`<div class="rv-empty">${Y}년에 기록된 책이 없어요.</div>`; body.innerHTML=h; wireReviewYear(years,yi); return; }
  h+=`<div class="rv-hero"><div class="big">${d.doneCount}</div><div class="cap">${Y}년에 완독한 책</div></div>`;
  h+=`<div class="rv-chips"><div class="rv-chip"><b>${d.passageCount}</b><span>모은 문장</span></div>`;
  if(d.avg) h+=`<div class="rv-chip"><b>★ ${d.avg.toFixed(1)}</b><span>평균 별점</span></div>`;
  if(d.topCat) h+=`<div class="rv-chip"><b>${d.topCat}</b><span>최다 분류</span></div>`;
  h+=`</div>`;
  const maxMo=Math.max(...d.months);
  if(maxMo>0){
    h+=`<div class="rv-sec"><h3>월별 완독</h3><div class="rv-months">`;
    d.months.forEach((v,i)=>{ const pct=v?Math.max(10,Math.round(v/maxMo*100)):0; h+=`<div class="rv-mo"><div class="mv">${v||''}</div><div class="bar" style="height:${pct}%"></div><div class="ml">${i+1}</div></div>`; });
    h+=`</div></div>`;
  }
  const cats=Object.entries(d.catCounts).filter(([k,v])=>v>0).sort((a,b)=>b[1]-a[1]);
  if(cats.length){
    const cmax=cats[0][1];
    h+=`<div class="rv-sec"><h3>분류 비중</h3><div class="rv-cat">`;
    cats.forEach(([k,v])=>{ h+=`<div class="rv-crow"><span class="rv-cname">${k}</span><div class="rv-ctrack"><div class="rv-cfill" style="width:${Math.round(v/cmax*100)}%;background:${catHex(k)}"></div></div><span class="rv-cnum">${v}권</span></div>`; });
    h+=`</div></div>`;
  }
  if(d.fiveStars.length){
    h+=`<div class="rv-sec"><h3>별 다섯, 올해의 책</h3><div class="rv-books">`;
    d.fiveStars.forEach(b=>{
      const cov=b.coverUrl?`<div class="cv" style="--cc:${catHex(b.cat)}"><img src="${esc(b.coverUrl)}" alt="" onerror="this.remove()"></div>`:`<div class="cv ph" style="--cc:${catHex(b.cat)}"><span>${esc(b.title||'')}</span></div>`;
      h+=`<div class="rv-bk" data-bid="${b.id}">${cov}<div class="bt">${esc(b.title||'')}</div></div>`;
    });
    h+=`</div></div>`;
  }
  if(d.loved.length){
    h+=`<div class="rv-sec"><h3>올해 아낀 문장</h3><div class="rv-quotes">`;
    d.loved.slice(0,6).forEach(p=>{ h+=`<div class="rv-q" data-bid="${p.id}"><div class="qt">“${esc(p.text)}”</div><div class="qs">『${esc(p.title)||'제목 없음'}』${p.author?' · '+esc(p.author):''}</div></div>`; });
    h+=`</div></div>`;
  }
  body.innerHTML=h;
  wireReviewYear(years,yi);
  body.querySelectorAll('[data-bid]').forEach(el=>el.onclick=()=>{ close('reviewOverlay'); openDetail(el.dataset.bid); });
}
function wireReviewYear(years,yi){
  const prev=document.getElementById('rvPrev'), next=document.getElementById('rvNext');
  if(prev && yi<years.length-1) prev.onclick=()=>{ state.reviewYear=years[yi+1]; renderReview(); };
  if(next && yi>0) next.onclick=()=>{ state.reviewYear=years[yi-1]; renderReview(); };
}
function reviewSummaryText(){
  const Y=state.reviewYear, d=reviewData(Y);
  let s=`📖 ${Y} 독서 결산\n\n완독 ${d.doneCount}권`;
  if(d.avg) s+=` · 평균 ★${d.avg.toFixed(1)}`;
  s+=`\n모은 문장 ${d.passageCount}개`;
  const cats=Object.entries(d.catCounts).filter(([k,v])=>v>0).sort((a,b)=>b[1]-a[1]);
  if(cats.length) s+=`\n분류: ${cats.map(([k,v])=>k+' '+v).join(' · ')}`;
  if(d.fiveStars.length) s+=`\n\n★★★★★ 올해의 책\n${d.fiveStars.map(b=>'· '+(b.title||'')+(b.author?' / '+b.author:'')).join('\n')}`;
  if(d.loved.length) s+=`\n\n아낀 문장\n${d.loved.slice(0,5).map(p=>'“'+p.text+'” — '+(p.title||'')).join('\n')}`;
  return s;
}
function copyReview(){
  const s=reviewSummaryText();
  const done=()=>showToast('결산 요약을 복사했어요');
  if(navigator.clipboard&&navigator.clipboard.writeText) navigator.clipboard.writeText(s).then(done,()=>fallbackCopy(s));

}
function fallbackCopy(s){ const ta=document.createElement('textarea'); ta.value=s; document.body.appendChild(ta); ta.select(); try{ document.execCommand('copy'); showToast('결산 요약을 복사했어요'); }catch(e){ showToast('복사에 실패했어요'); } ta.remove(); }

/* ---------- filtering ---------- */
function matches(b){
  if(state.cat!=='전체' && b.cat!==state.cat) return false;
  if(state.tags.length){ const bt=b.tags||[]; if(!state.tags.every(t=>bt.includes(t))) return false; }
  if(state.q){
    const hay=[b.title,b.author,b.publisher,b.oneliner,b.key,b.insight,b.quote,b.note,(b.tags||[]).join(' '),(b.quoteShots||[]).map(s=>s.text||'').join(' ')].join(' ').toLowerCase();
    if(!hay.includes(state.q.toLowerCase())) return false;
  }
  return true;
}
function sortBooks(arr){
  const s=state.sort;
  return arr.slice().sort((a,b)=>{
    if(s==='title') return (a.title||'').localeCompare(b.title||'','ko');
    if(s==='rating') return (b.rate||0)-(a.rate||0);
    if(s==='date') return (b.date||'').localeCompare(a.date||'');
    return (b.createdAt||0)-(a.createdAt||0);
  });
}
function sealRate(n){ let h=''; for(let i=1;i<=5;i++) h+=`<i class="${i<=n?'f':''}"></i>`; return `<div class="seal-rate">${h}</div>`; }

function updateTabCounts(){

  if(c) c.textContent=excerptPool().length;

function setMode(m){ if(state.mode===m) return; state.mode=m; saveMode(); render(); }
function excerptPool(){
  const pool=[];
  books.forEach(b=>{
    const base={id:b.id,title:b.title,author:b.author,cat:b.cat,tags:(b.tags||[]),bump:(b.updatedAt||b.createdAt||0)};
    (b.quote||'').split('\n').map(s=>s.trim()).filter(Boolean).forEach(t=>pool.push({...base,text:t,type:'구절'}));
    (b.insight||'').split('\n').map(s=>s.trim()).filter(Boolean).forEach(t=>pool.push({...base,text:t,type:'인사이트'}));
    (b.quoteShots||[]).forEach(s=>pool.push({...base,text:(s.text||'').trim(),type:'사진',img:s.img}));
  });
  return pool;
}
function seededShuffle(arr,seed){
  const a=arr.slice(); let s=seed||1;
  for(let i=a.length-1;i>0;i--){ s=(s*9301+49297)%233280; const j=Math.floor(s/233280*(i+1)); const t=a[i]; a[i]=a[j]; a[j]=t; }
  return a;
}
function exCardHTML(p){

    <div class="ex-type">${typeLabel}</div>

    <div class="ex-src"><span class="dot" style="background:${catHex(p.cat)}"></span><b>『${esc(p.title)||'제목 없음'}』</b>${p.author?' · '+esc(p.author):''}</div>

}

/* ---------- daily quote ("오늘 다시 보는 문장") ---------- */
function passagePool(){
  const pool=[];
  books.forEach(b=>{
    (b.quote||'').split('\n').map(s=>s.trim()).filter(Boolean).forEach(t=>pool.push({text:t,type:'구절',id:b.id,title:b.title,author:b.author,cat:b.cat}));
    (b.insight||'').split('\n').map(s=>s.trim()).filter(Boolean).forEach(t=>pool.push({text:t,type:'인사이트',id:b.id,title:b.title,author:b.author,cat:b.cat}));
    (b.quoteShots||[]).forEach(s=>{ const t=(s.text||'').trim(); if(t) pool.push({text:t,type:'구절',id:b.id,title:b.title,author:b.author,cat:b.cat}); });
  });
  return pool;
}
function todayKey(){ const d=new Date(); return d.getFullYear()*10000+(d.getMonth()+1)*100+d.getDate(); }
function dailyIndex(n,seed){ let x=Math.sin(seed*9301+49297)*233280; x=x-Math.floor(x); return Math.floor(x*n); }
function pickDailyKey(){
  const pool=passagePool(); if(!pool.length) return null;
  let weighted=[];
  pool.forEach(p=>{ const r=reactionOf(p); if(r===-1) return; const w=r===1?3:1; for(let k=0;k<w;k++) weighted.push(p); });
  if(!weighted.length) weighted=pool.slice();
  return passKey(weighted[dailyIndex(weighted.length,todayKey())]);
}
function randomDailyKey(excludeKey){
  const pool=passagePool().filter(p=>reactionOf(p)!==-1);
  if(!pool.length) return null;
  if(pool.length===1) return passKey(pool[0]);
  let pick; do{ pick=pool[Math.floor(Math.random()*pool.length)]; }while(passKey(pick)===excludeKey);
  return passKey(pick);
}
function renderDaily(show){
  const el=document.getElementById('daily');
  const pool=show?passagePool():[];
  if(!show || pool.length===0){ el.classList.add('hide'); el.innerHTML=''; return; }
  const today=todayKey();
  if(state.dailyDay!==today){ state.dailyDay=today; state.dailyKey=null; }
  let p = state.dailyKey ? pool.find(x=>passKey(x)===state.dailyKey) : null;
  if(!p){ state.dailyKey=pickDailyKey(); p=pool.find(x=>passKey(x)===state.dailyKey); }
  if(!p){ el.classList.add('hide'); el.innerHTML=''; return; }
  el.classList.remove('hide');
  const r=reactionOf(p);
  const src=`<span class="dot" style="background:${catHex(p.cat)}"></span><span><b>『${esc(p.title)||'제목 없음'}』</b>${p.author?' · '+esc(p.author):''}</span>`;
  el.innerHTML=`
    <div class="daily-eyebrow">오늘 다시 보는 ${p.type==='구절'?'문장':'인사이트'}
      <button class="daily-shuffle" id="dailyShuffle" title="다른 문장 보기">↻</button>
    </div>
    <div class="daily-text">${esc(p.text)}</div>
    <div class="daily-src">${src}</div>
    <div class="daily-react">
      <button class="dr up ${r===1?'on':''}" data-r="up">👍 <span>좋아요</span></button>
      <button class="dr down ${r===-1?'on':''}" data-r="down">🔕 <span>그만</span></button>
    </div>`;
  el.querySelector('.daily-text').onclick=()=>openDetail(p.id);

function compressImage(file,maxDim=1280,quality=0.72){
  return new Promise((resolve,reject)=>{
    const reader=new FileReader();
    reader.onload=()=>{
      const img=new Image();
      img.onload=()=>{
        let w=img.width,h=img.height;
        if(w>=h && w>maxDim){ h=Math.round(h*maxDim/w); w=maxDim; }
        else if(h>w && h>maxDim){ w=Math.round(w*maxDim/h); h=maxDim; }
        const cv=document.createElement('canvas'); cv.width=w; cv.height=h;
        cv.getContext('2d').drawImage(img,0,0,w,h);
        try{ resolve(cv.toDataURL('image/jpeg',quality)); }catch(e){ reject(e); }
      };
      img.onerror=()=>reject(new Error('이미지를 읽을 수 없습니다'));
      img.src=reader.result;
    };
    reader.onerror=()=>reject(new Error('파일 읽기 실패'));
    reader.readAsDataURL(file);
  });
}

}

/* ---------- OCR (Tesseract.js, lazy CDN + cached) ---------- */
const ocrBusy=new WeakSet();
let _tessScript=null, _ocrWorker=null, _ocrWorkerP=null;
function loadTesseract(){
  if(window.Tesseract) return Promise.resolve();
  if(_tessScript) return _tessScript;
  _tessScript=new Promise((res,rej)=>{
    const s=document.createElement('script');
    s.src='https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js';
    s.async=true; s.onload=()=>res(); s.onerror=()=>{ _tessScript=null; rej(new Error('OCR 로드 실패')); };
    document.head.appendChild(s);
  });
  return _tessScript;
}
async function getOcrWorker(){
  if(_ocrWorker) return _ocrWorker;
  if(_ocrWorkerP) return _ocrWorkerP;
  _ocrWorkerP=(async()=>{
    showToast('글자 인식 준비 중… (첫 1회만 받아요)');
    await loadTesseract();
    const w=await window.Tesseract.createWorker('kor+eng');
    _ocrWorker=w; return w;
  })();
  try{ return await _ocrWorkerP; }catch(e){ _ocrWorkerP=null; throw e; }
}
async function ocrImage(dataUrl){
  const w=await getOcrWorker();
  const { data:{ text } }=await w.recognize(dataUrl);
  return (text||'').replace(/[ \t]+\n/g,'\n').replace(/\n{3,}/g,'\n\n').trim();
}
async function runShotOCR(shot, reRender){
  ocrBusy.add(shot); if(reRender) reRender();
  let ok=true, txt='';
  try{ txt=await ocrImage(shot.img); shot.text=txt; }
  catch(e){ ok=false; }
  ocrBusy.delete(shot); if(reRender) reRender();
  save(); render();
  if(!ok) showToast('글자 인식 실패 — 인터넷 연결을 확인하세요');
  else if(!txt) showToast('글자를 찾지 못했어요 — 직접 입력해 주세요');
}

/* ---------- data safety: 홈 화면 설치 + 백업 알림 ---------- */
function isiOS(){ return /iphone|ipad|ipod/i.test(navigator.userAgent) || ((navigator.platform||'').indexOf('Mac')>=0 && 'ontouchend' in document); }
function isStandalone(){ try{ return (window.matchMedia && window.matchMedia('(display-mode: standalone)').matches) || window.navigator.standalone===true; }catch(e){ return false; } }
function lastBackup(){ try{ return +localStorage.getItem(BACKUP_KEY)||0; }catch(e){ return 0; } }
function setLastBackup(t){ try{ localStorage.setItem(BACKUP_KEY,String(t||Date.now())); }catch(e){} }
function installManifest(){
  try{
    const icon=(document.querySelector('link[rel="apple-touch-icon"]')||{}).href||'';
    const m={name:'책장 · 나의 독서 기록',short_name:'책장',display:'standalone',background_color:'#FFFFFF',theme_color:'#FFFFFF',icons:icon?[{src:icon,sizes:'180x180',type:'image/png',purpose:'any maskable'}]:[]};
    const url=URL.createObjectURL(new Blob([JSON.stringify(m)],{type:'application/manifest+json'}));
    const l=document.createElement('link'); l.rel='manifest'; l.href=url; document.head.appendChild(l);
  }catch(e){}
}
function renderSafetyNudge(){
  const el=document.getElementById('safetyNudge'); if(!el) return;
  const DAY=86400000, now=Date.now();
  let tipDismissed=false, snoozeUntil=0;
  try{ tipDismissed=localStorage.getItem(INSTALL_TIP_KEY)==='1'; }catch(e){}
  try{ snoozeUntil=+localStorage.getItem(SNOOZE_KEY)||0; }catch(e){}
  // 1) iOS 사파리인데 홈 화면 미설치 → 설치 안내(데이터 보존의 핵심)
  if(isiOS() && !isStandalone() && !tipDismissed){
    el.classList.remove('hide');
    el.innerHTML='<div class="sn-ico">📲</div><div class="sn-body"><div class="sn-title">홈 화면에 추가하면 기록이 안전해요</div><div class="sn-desc">사파리는 한동안 방문하지 않은 사이트의 저장 기록을 지울 수 있어요. 공유 버튼 → “홈 화면에 추가”로 앱처럼 설치하면 기록이 보존됩니다.</div><div class="sn-actions"><button class="sn-go" data-act="ok">알겠어요</button></div></div><button class="sn-x" data-act="ok" aria-label="닫기">×</button>';
    el.querySelectorAll('[data-act="ok"]').forEach(b=>b.onclick=()=>{ try{ localStorage.setItem(INSTALL_TIP_KEY,'1'); }catch(e){} el.classList.add('hide'); });
    return;
  }
  // 2) 백업 권유 (책이 있고, 마지막 백업 후 변경이 있고, 7일 이상 지났고, 스누즈 아님)
  const lb=lastBackup();
  const lastChange=books.reduce((mx,b)=>Math.max(mx,b.updatedAt||b.createdAt||0),0);
  if(books.length>0 && lastChange>lb && (now-lb>7*DAY) && now>snoozeUntil){
    el.classList.remove('hide');
    const when = lb ? ('마지막 백업 후 '+Math.floor((now-lb)/DAY)+'일이 지났어요.') : '아직 백업한 적이 없어요.';
    el.innerHTML='<div class="sn-ico">💾</div><div class="sn-body"><div class="sn-title">기록을 백업해 두세요</div><div class="sn-desc">'+when+' 백업 파일(JSON)로 내려받아 두면 기기를 바꾸거나 기록이 지워져도 되살릴 수 있어요.</div><div class="sn-actions"><button class="sn-go" data-act="backup">지금 백업</button><button data-act="later">나중에</button></div></div><button class="sn-x" data-act="later" aria-label="닫기">×</button>';
    el.querySelector('[data-act="backup"]').onclick=()=>{ exportData(); };
    el.querySelectorAll('[data-act="later"]').forEach(b=>b.onclick=()=>{ try{ localStorage.setItem(SNOOZE_KEY,String(now+3*DAY)); }catch(e){} el.classList.add('hide'); });
    return;
  }
  el.classList.add('hide'); el.innerHTML='';
}

function importData(file){

      const arr=JSON.parse(r.result); if(!Array.isArray(arr)) throw 0;
      if(!confirm(`${arr.length}권을 불러옵니다.\n확인=기존 기록에 추가 / 취소=중단`)) return;
      arr.forEach(b=>{ if(!b.id) b.id=uid(); if(!b.createdAt) b.createdAt=Date.now(); });
      const ids=new Set(books.map(b=>b.id));
      arr.forEach(b=>{ if(!ids.has(b.id)) books.push(b); });
      const ok=save(); render();
      alert((ok||memoryOnly)?'불러오기 완료.':'불러왔지만 저장 공간이 부족해 영구 저장되지 않았습니다. 사진 용량을 줄여 보세요.');
    }catch(e){ alert('JSON 파일을 읽을 수 없습니다.'); }
  };
  r.readAsText(file);
}

/* ---------- modal helpers ---------- */
function open(id){ document.getElementById(id).classList.add('show'); document.body.style.overflow='hidden'; }
function close(id){ document.getElementById(id).classList.remove('show'); document.body.style.overflow=''; }

/* ---------- wire ---------- */
document.getElementById('q').oninput=e=>{ state.q=e.target.value; render(); };
document.getElementById('sortSel').onchange=e=>{ state.sort=e.target.value; render(); };
document.getElementById('exSort').onchange=e=>{ state.exSort=e.target.value; if(state.exSort==='random') state.excerptSeed=Date.now(); render(); };
document.querySelectorAll('.tab').forEach(t=>t.onclick=()=>setMode(t.dataset.mode));
document.getElementById('themeBtn').onclick=toggleTheme;
document.getElementById('addBtn').onclick=()=>openEdit(null);
document.getElementById('emptyAdd').onclick=()=>openEdit(null);
document.getElementById('saveBtn').onclick=saveBook;
document.getElementById('deleteBtn').onclick=deleteBook;
document.getElementById('aiBtn').onclick=aiSummarize;
document.getElementById('qBtn').onclick=lookup;
document.getElementById('qInput').addEventListener('keydown',e=>{ if(e.key==='Enter'){ e.preventDefault(); lookup(); } });
document.getElementById('fCover').addEventListener('input',updateCvThumb);
document.getElementById('addPhotoBtn').onclick=()=>document.getElementById('photoInput').click();
document.getElementById('photoInput').onchange=e=>{ addPhotos(e.target.files); e.target.value=''; };
document.getElementById('lightbox').onclick=closeLightbox;
document.getElementById('dEdit').onclick=()=>{ close('detailOverlay'); openEdit(state.detailId); };
document.getElementById('exportBtn').onclick=exportData;
document.getElementById('importBtn').onclick=()=>document.getElementById('fileIn').click();
document.getElementById('fileIn').onchange=e=>{ if(e.target.files[0]) importData(e.target.files[0]); e.target.value=''; };
document.getElementById('tagBtn').onclick=()=>{ state.cloudOpen=!state.cloudOpen; document.getElementById('tagCloud').classList.toggle('open',state.cloudOpen); document.getElementById('tagBtn').classList.toggle('on',state.cloudOpen); };
document.querySelectorAll('.viewtog button').forEach(b=>b.onclick=()=>{
  state.view=b.dataset.view; saveView();
  document.querySelectorAll('.viewtog button').forEach(x=>x.classList.toggle('on',x.dataset.view===state.view));
  render();
});
document.querySelectorAll('[data-close]').forEach(b=>b.onclick=()=>{ close('editOverlay'); close('detailOverlay'); });
document.querySelectorAll('[data-rclose]').forEach(b=>b.onclick=()=>close('reviewOverlay'));
document.getElementById('reviewCopy').onclick=copyReview;
document.querySelectorAll('[data-qclose]').forEach(b=>b.onclick=closeQuick);
document.getElementById('qcSave').onclick=saveQuick;
document.getElementById('qcPhotoBtn').onclick=()=>document.getElementById('qcPhotoInput').click();
document.getElementById('qcPhotoInput').onchange=e=>{ addQuickPhotos(e.target.files); e.target.value=''; };
document.getElementById('directPhotoInput').onchange=e=>{ handleDirectPhotos(e.target.files); e.target.value=''; };
document.querySelectorAll('.overlay').forEach(o=>o.onclick=e=>{ if(e.target===o){ o.classList.remove('show'); document.body.style.overflow=''; if(o.id==='quickOverlay'){ state.quickId=null; state.quickPhotos=[]; } } });
document.addEventListener('keydown',e=>{ if(e.key==='Escape'){ if(document.getElementById('lightbox').classList.contains('show')){ closeLightbox(); return; } close('editOverlay'); close('detailOverlay'); close('reviewOverlay'); closeQuick(); } });

/* ---------- init ---------- */
load();
applyTheme();
installManifest();
document.querySelectorAll('.viewtog button').forEach(x=>x.classList.toggle('on',x.dataset.view===state.view));
render();
</script>
</body>
</html>
